      guide:
        title: "Setup Guide — How to connect SharePoint"
        subtitle: "Follow these steps to register an Azure App and link it to OpenProject."
        step1_title: "Sign in to Azure Portal"
        step1_body: "Go to portal.azure.com using a Global Administrator or Application Administrator account."
        step2_title: "Create a new App Registration"
        step2_body: >
          Navigate to Azure Active Directory > App registrations > New registration.
          Enter a name (e.g. "OpenProject SharePoint"), select "Accounts in this organizational
          directory only", then click Register.
        step3_title: "Copy Tenant ID and Client ID"
        step3_body: >
          On the app overview page, copy the Directory (tenant) ID and Application (client) ID.
          Paste them into the Tenant ID and Client ID fields below.
        step4_title: "Create a Client Secret"
        step4_body: >
          Go to Certificates & secrets > New client secret. Set a description and expiry,
          click Add, then immediately copy the Value (it is shown only once).
          Paste it into the Client Secret field below.
        step5_title: "Grant API Permissions"
        step5_body: >
          Go to API permissions > Add a permission > Microsoft Graph > Application permissions.
          Add Sites.Read.All and Files.Read.All, then click Grant admin consent for your tenant.
        step6_title: "Enter SharePoint Root URL, Save and Test"
        step6_body: >
          Enter your SharePoint root URL (e.g. https://contoso.sharepoint.com),
          click Save, then click Test Connection to verify the setup is working correctly.
